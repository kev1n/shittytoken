{% extends "base.html" %}
{% block title %}Log In — ShittyToken{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 3rem auto;">
    <h1 style="color: var(--text-bright); font-size: 1.75rem; margin-bottom: 0.5rem;">Log In</h1>
    <p class="text-dim mb-3">Welcome back.</p>

    <form method="post" action="/login">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Your password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
            Log In
        </button>
    </form>

    <p class="text-dim text-center mt-3" style="font-size: 0.9rem;">
        Don't have an account? <a href="/signup">Sign up</a>
    </p>
</div>
{% endblock %}
