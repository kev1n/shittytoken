<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShittyToken{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --bg-card: #111111;
            --bg-card-hover: #1a1a1a;
            --border: #222;
            --text: #e0e0e0;
            --text-dim: #888;
            --text-bright: #fff;
            --accent: #00ff88;
            --accent-dim: #00cc6a;
            --danger: #ff4444;
            --danger-dim: #cc3333;
            --info: #4488ff;
            --warning: #ffaa00;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
        }

        code, .mono {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* ── Nav ─────────────────────────────────────────── */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.15s;
        }

        .nav-links a:hover {
            color: var(--accent);
            text-decoration: none;
        }

        /* ── Main content ────────────────────────────────── */
        main {
            flex: 1;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ── Flash messages ──────────────────────────────── */
        .flash {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            border: 1px solid;
        }

        .flash-success {
            background: rgba(0, 255, 136, 0.08);
            border-color: rgba(0, 255, 136, 0.3);
            color: var(--accent);
        }

        .flash-error {
            background: rgba(255, 68, 68, 0.08);
            border-color: rgba(255, 68, 68, 0.3);
            color: var(--danger);
        }

        .flash-info {
            background: rgba(68, 136, 255, 0.08);
            border-color: rgba(68, 136, 255, 0.3);
            color: var(--info);
        }

        /* ── Cards ───────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card h2, .card h3 {
            color: var(--text-bright);
            margin-bottom: 1rem;
        }

        /* ── Buttons ─────────────────────────────────────── */
        .btn {
            display: inline-block;
            padding: 0.6rem 1.25rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
        }

        .btn-primary:hover {
            background: var(--accent-dim);
            text-decoration: none;
        }

        .btn-danger {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: rgba(255, 68, 68, 0.1);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-sm {
            padding: 0.35rem 0.75rem;
            font-size: 0.8rem;
        }

        /* ── Forms ───────────────────────────────────────── */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 0.4rem;
        }

        .form-group input[type="email"],
        .form-group input[type="password"],
        .form-group input[type="text"] {
            width: 100%;
            padding: 0.6rem 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-bright);
            font-size: 0.95rem;
            transition: border-color 0.15s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* ── Tables ──────────────────────────────────────── */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        table td {
            padding: 0.6rem 0.75rem;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* ── Utilities ───────────────────────────────────── */
        .text-dim { color: var(--text-dim); }
        .text-accent { color: var(--accent); }
        .text-danger { color: var(--danger); }
        .text-bright { color: var(--text-bright); }
        .text-center { text-align: center; }
        .mb-1 { margin-bottom: 0.5rem; }
        .mb-2 { margin-bottom: 1rem; }
        .mb-3 { margin-bottom: 1.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mt-3 { margin-top: 1.5rem; }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-active {
            background: rgba(0, 255, 136, 0.15);
            color: var(--accent);
        }

        .badge-revoked {
            background: rgba(255, 68, 68, 0.15);
            color: var(--danger);
        }

        /* ── Key display ─────────────────────────────────── */
        .key-display {
            background: rgba(0, 255, 136, 0.06);
            border: 1px solid rgba(0, 255, 136, 0.25);
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .key-display code {
            flex: 1;
            font-size: 0.85rem;
            word-break: break-all;
            color: var(--accent);
        }

        .copy-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0.4rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: var(--accent-dim);
        }

        /* ── Footer ──────────────────────────────────────── */
        footer {
            border-top: 1px solid var(--border);
            padding: 1.5rem 2rem;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        /* ── Responsive ──────────────────────────────────── */
        @media (max-width: 640px) {
            nav {
                padding: 0.75rem 1rem;
            }
            main {
                padding: 1rem;
            }
            .nav-links {
                gap: 1rem;
            }
            .card {
                padding: 1rem;
            }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav>
        <a href="/" class="nav-brand">shittytoken</a>
        <div class="nav-links">
            {% if user_id %}
                <a href="/dashboard">Dashboard</a>
                <a href="/billing">Billing</a>
                <form method="post" action="/logout" style="display:inline">
                    <button type="submit" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:0.9rem;font-weight:500;">Logout</button>
                </form>
            {% else %}
                <a href="/login">Login</a>
                <a href="/signup" class="btn btn-primary btn-sm">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% for flash in flashes %}
            <div class="flash flash-{{ flash.category }}">{{ flash.message }}</div>
        {% endfor %}
        {% block content %}{% endblock %}
    </main>

    <footer>
        shittytoken &mdash; cheap inference, no bs
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
