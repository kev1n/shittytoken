# ShittyToken configuration
# Secrets (API keys, passwords) stay in .env — this file is for tunable parameters.

# ── Models ──────────────────────────────────────────────────────────────────
models:
  serving:
    - model_id: "cyankiwi/Qwen3.5-35B-A3B-AWQ-4bit"
      params_b: 35
      active_params_b: 3
      quantization: "awq"
      dtype: "fp16"

# ── GPUs ────────────────────────────────────────────────────────────────────
gpus:
  catalog:
    - name: "RTX 3090"
      vram_gb: 24
      memory_bandwidth_gbs: 936
    - name: "RTX 4090"
      vram_gb: 24
      memory_bandwidth_gbs: 1008
    - name: "L40S"
      vram_gb: 48
      memory_bandwidth_gbs: 864
    - name: "A100 SXM4 80GB"
      vram_gb: 80
      memory_bandwidth_gbs: 2000
    - name: "H100 SXM5 80GB"
      vram_gb: 80
      memory_bandwidth_gbs: 3350

  # GPUs to search for when provisioning spot instances
  preferred: ["RTX 3090"]

  # Minimum requirements for offer filtering
  min_gpu_total_ram_gb: 24
  min_inet_up_mbps: 100.0
  min_pcie_bw_gbps: 5.0
  min_reliability: 0.95
  min_gpus: 2

# ── vLLM defaults ──────────────────────────────────────────────────────────
# Initial configuration seeded into the knowledge graph per GPU.
# The agent may propose different values via OOM recovery or LLM config proposal.
vllm:
  defaults:
    tensor_parallel_size: 2
    max_model_len: 200000
    gpu_memory_utilization: 0.92
    quantization: null # let vLLM auto-detect from model config
    kv_cache_dtype: "fp8_e4m3"
    max_num_seqs: 16
    enable_prefix_caching: true
    enforce_eager: false

  worker_port: 8080
  docker_image: "vllm/vllm-openai:latest"
  disk_gb: 10
  tool_call_parser: "qwen3_coder"
  reasoning_parser: "qwen3"
  attention_backend: "FLASHINFER"

  # pip packages to install before starting vLLM
  pre_install:
    - "fastsafetensors"

  # Extra CLI flags passed directly to vllm serve
  extra_args:
    - "--load-format"
    - "fastsafetensors"
    - "--max-num-batched-tokens"
    - "8192"
    - "--optimization-level"
    - "3"
    - "--performance-mode"
    - "throughput"
    - "--mamba-cache-mode"
    - "align"
    - "--mamba-block-size"
    - "8"

  # Environment variables set on the container
  env:
    VLLM_USE_DEEP_GEMM: "0"
    VLLM_USE_FLASHINFER_MOE_FP16: "1"
    VLLM_USE_FLASHINFER_SAMPLER: "0"

# ── Gateway ─────────────────────────────────────────────────────────────────
gateway:
  router:
    port: 8001
    metrics_port: 29000
    policy: "cache_aware"
    health_check_timeout_sec: 30.0

  nginx:
    listen_port: 80
    read_timeout_sec: 120
    send_timeout_sec: 120

  auth:
    enabled: true # toggle for dev/testing
    rate_limit_default_rpm: 1500

  billing:
    postgres_dsn: "postgresql://shittytoken:shittytoken_dev@localhost:5432/shittytoken"
    redis_url: "redis://localhost:6379/0"
    reconcile_interval_s: 60.0
    # pricing: per-model input/output rates (cents per 1M tokens).
    # Defaults: input=2.5 ($0.025/1M), output=15.0 ($0.15/1M)
    pricing:
      default:
        input_per_1m: 2.5    # $0.025 per 1M input tokens
        output_per_1m: 15.0  # $0.15 per 1M output tokens
      # Per-model overrides:
      # "cyankiwi/Qwen3.5-35B-A3B-AWQ-4bit":
      #   input_per_1m: 2.5
      #   output_per_1m: 15.0
    # kafka (optional — omit to use in-process queue):
    # kafka_bootstrap_servers: "localhost:9092"
    # kafka_topic: "shittytoken.usage"

# ── Orchestrator ────────────────────────────────────────────────────────────
orchestrator:
  redis_url: "redis://localhost:6379/0"  # shared with billing
  provider: vastai # vastai | runpod
  min_workers: 1
  scale_up_waiting_threshold: 10
  scale_down_idle_seconds: 300
  scale_down_cache_max: 0.50
  metrics_poll_interval_s: 10
  health_check_interval_s: 30
  health_failure_threshold: 3
  startup_monitor_timeout_s: 1200
  provision_cooldown_s: 60
  stuck_instance_timeout_s: 1320  # startup_monitor_timeout_s + 120
  ssh_ready_timeout_s: 600 # max time to wait for SSH after renting
  instance_poll_interval_sec: 15

  # Persistent volume cache — caches model weights, torch.compile artifacts,
  # and Triton kernels on a Vast.ai volume tied to the physical machine.
  # Volumes are machine-local: they only help when re-renting the same machine.
  volume_cache:
    enabled: true
    mount_path: "/cache"
    size_gb: 40
    eviction_days: 3          # delete volumes unused for this many days
    label_prefix: "stcache"  # volume label prefix (alphanumeric only, Vast.ai requirement)

  # RunPod-specific settings (spot only)
  runpod:
    cloud_type: SECURE # COMMUNITY | SECURE | ALL
    spot_poll_interval_sec: 10

# ── SSH ─────────────────────────────────────────────────────────────────────
ssh:
  keepalive_interval: 30
  vram_tolerance: 0.95

# ── Benchmark ───────────────────────────────────────────────────────────────
benchmark:
  # test_mode: log benchmark failures but keep the instance running (don't destroy)
  test_mode: true
  # Pass/fail thresholds (relaxed for 2x RTX 3090 spot instances)
  min_throughput_tps: 2.0
  max_cold_cache_ttft_p95: 30.0
  max_warm_cache_ttft_p95: 15.0
  min_prefix_cache_hit_rate_phase3: 0.0
  deltanet_cache_flag_threshold: 0.01
  max_failed_request_rate: 0.10

  # Shape
  metrics_scrape_interval_sec: 2.0
  warm_up_requests_per_prefix: 7
  concurrency_levels: [1, 4, 8, 16]

  # Long-context agent flow (phase 4)
  long_context:
    enabled: true
    context_steps_tokens: [8192, 16384, 32768, 65536, 131072]
    output_tokens_per_step: 512
    request_timeout_sec: 300.0 # long-context needs more time

  # Timeouts
  request_timeout_sec: 120.0
  first_token_timeout_sec: 30.0

  # Virtual users
  returning_user_fraction: 0.80
  max_sessions: 200
