version: "3.9"
services:
  neo4j:
    image: neo4j:5.18-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/shittytoken_dev"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "shittytoken_dev", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: shittytoken
      POSTGRES_USER: shittytoken
      POSTGRES_PASSWORD: shittytoken_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shittytoken -d shittytoken"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mock-worker
    ports:
      - "8000:8000"
    environment:
      MOCK_TTFT_MS: "150"
      MOCK_TOKEN_RATE_PER_SEC: "80"
      MOCK_CACHE_HIT_RATE: "0.65"
      MOCK_FAIL_RATE: "0.01"
      MOCK_NUM_OUTPUT_TOKENS: "50"

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    depends_on:
      - mock-worker
    # In dev: mount a pre-rendered nginx.conf
    # In prod: rendered by gateway/nginx_config.py at startup

volumes:
  neo4j_data:
  postgres_data:
  redis_data:
